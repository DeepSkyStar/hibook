<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hibook</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Hibook Generated Knowledge Base">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href=".hibook_web/vue.css">
  <link rel="stylesheet" href=".hibook_web/sidebar.min.css" />
  <link rel="stylesheet" href=".hibook_web/katex.min.css" />
  <link rel="stylesheet" href=".hibook_web/vendor/easymde/easymde.min.css" />
  <link rel="stylesheet" href=".hibook_web/custom.css?v=10" />
</head>
<body>
  <div id="app">加载中...</div>

  <!-- Docsify Configuration -->
  <script src=".hibook_web/config.v3.js"></script>
  
  <!-- Docsify v4 Core -->
  <script src=".hibook_web/docsify.min.js"></script>
  
  <!-- Hibook Custom Plugins -->
  <script src=".hibook_web/vendor/easymde/easymde.min.js"></script>
  <script src=".hibook_web/plugins/wikilinks.js?v=4"></script>
  <script src=".hibook_web/plugins/backlinks.js?v=7"></script>
  <script src=".hibook_web/plugins/toolbar.js?v=105"></script>
  <script src=".hibook_web/plugins/editor.js?v=21"></script>
  <script src=".hibook_web/plugins/git-timeline.js?v=46"></script>
  <script src=".hibook_web/plugins/graph-view.js?v=4"></script>
  <script src=".hibook_web/plugins/search.js?v=3"></script>
  <script src=".hibook_web/plugins/sidebar-tabs.js?v=10"></script>
  <script src=".hibook_web/plugins/explorer.js?v=20"></script>
  
  <!-- Mobile Gestures -->
  <script src=".hibook_web/mobile-gestures.js"></script>
  
  <!-- Mermaid v9 Single Bundle CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'neutral', 
        securityLevel: 'loose', 
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } 
    });
    
    // Handle race condition: if Docsify rendered before Mermaid loaded
    window.addEventListener('load', function() {
        var nodes = document.querySelectorAll('.mermaid');
        if (nodes.length > 0) {
            mermaid.init(undefined, nodes);
        }
    });
  </script>
  <!-- KaTeX -->
  <script src=".hibook_web/katex.min.js"></script>
  <script src=".hibook_web/docsify-katex.js"></script>

  <!-- Mobile Sidebar Shield -->
  <script>
    (function() {
        // Prevent mobile sidebar from aggressively auto-collapsing
        // when clicking our custom buttons or tree items.
        window.keepSidebarOpenOnMobile = false;
        
        // 1. Intercept all clicks on the sidebar in the capture phase
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');
                // If clicked inside the sidebar but NOT on the native hamburger toggle
                if (sidebar && sidebar.contains(e.target) && !e.target.closest('.sidebar-toggle')) {
                    window.keepSidebarOpenOnMobile = true;
                    // Auto-release the shield after 300ms (enough time to absorb Docsify changes)
                    setTimeout(() => window.keepSidebarOpenOnMobile = false, 300);
                }
            }
        }, true);
        
        // 2. Docsify closes the sidebar by removing the 'close' class on body. 
        // We use a MutationObserver to instantly put it back if our shield is active.
        const observer = new MutationObserver((mutations) => {
            if (window.innerWidth <= 768 && window.keepSidebarOpenOnMobile) {
                mutations.forEach((m) => {
                    if (m.attributeName === 'class' && !document.body.classList.contains('close')) {
                        // Docsify stripped it! Put it back.
                        document.body.classList.add('close');
                    }
                });
            }
        });
        observer.observe(document.body, { attributes: true });
    })();
  </script>
</body>
</html>
